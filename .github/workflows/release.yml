name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_nif:
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
          - target: aarch64-linux
            os: ubuntu-24.04-arm
          - target: aarch64-macos
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - run: zig build -Doptimize=ReleaseFast
      - run: |
          NIF_FILE=$(find zig-out -name "libflame_on_processor_nif.*" -type f | head -1)
          mkdir -p release
          cp "$NIF_FILE" release/
          cd release
          tar czf "flame_on_processor-nif-${{ matrix.target }}.tar.gz" libflame_on_processor_nif.*
          shasum -a 256 "flame_on_processor-nif-${{ matrix.target }}.tar.gz" > "flame_on_processor-nif-${{ matrix.target }}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.target }}
          path: release/flame_on_processor-nif-*

  release:
    needs: build_nif
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
